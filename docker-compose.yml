version: '3'

services:
  dashboard:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - .:/app
    command: >
      bash -c "pip install --no-cache-dir streamlit pandas psycopg2-binary &&
               streamlit run dashboard/app.py --server.port 8502 --server.address 0.0.0.0"
    ports:
      - "8503:8503"
